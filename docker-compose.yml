services:
  postgres:
    image: postgres:16-alpine
    container_name: calculator-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: calculator
      POSTGRES_PASSWORD: calculator
      POSTGRES_DB: calculator_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calculator -d calculator_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
